syntax = "proto3";

package snapshot_mgmt;

// SnapshotMgmtService is the management API exposed by the vmm-sandboxer for
// snapshot lifecycle operations on already-running sandboxes.  kuasar-ctl
// connects to the management socket and calls these RPCs.
service SnapshotMgmtService {
    // CreateSnapshot pauses the running sandbox, writes a CHv snapshot to the
    // store under the given key, then resumes the sandbox.
    rpc CreateSnapshot (CreateSnapshotRequest) returns (CreateSnapshotResponse);
}

message CreateSnapshotRequest {
    // sandbox_id is the ID of the currently-running sandbox to snapshot.
    string sandbox_id = 1;
    // key is the human-readable name stored in the snapshot store.
    string key = 2;
}

message CreateSnapshotResponse {
    // snapshot_id is the SHA-256 content-addressable ID assigned by the store.
    string snapshot_id = 1;
    string key = 2;
    uint64 memory_size_bytes = 3;
    uint64 state_size_bytes = 4;
}
